name: V2EX 每日签到

on:
  schedule:
    # ================================================================
    # cron 设为 UTC 02:00（北京 10:00）触发
    # 触发后随机延迟 0~7200 秒（0~2 小时），实际签到在 10:00~12:00 之间
    # 想改时间段：改 cron 的触发起点 + 下方延迟范围
    #   北京 10:00 = UTC 02:00 → '0 2 * * *'
    #   北京 11:00 = UTC 03:00 → '0 3 * * *'
    # ================================================================
    - cron: '0 2 * * *'
  workflow_dispatch: # 手动触发（Actions 页 → Run workflow，手动跑不延迟）

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 随机延迟
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 7200))
          echo "随机延迟 $DELAY 秒（约 $((DELAY / 60)) 分钟），实际签到时间在 10:00~12:00 之间"
          sleep $DELAY

      - name: 执行签到
        env:
          # 单账号：只需 V2EX_COOKIE
          # 多账号：用 V2EX_ACCOUNTS（JSON 数组），V2EX_COOKIE 可不配
          # 两者可同时存在，脚本会合并执行
          V2EX_COOKIE: ${{ secrets.V2EX_COOKIE }}
          V2EX_ACCOUNTS: ${{ secrets.V2EX_ACCOUNTS }}
          # Telegram 通知（可选，不配则不推送）
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python v2ex_checkin.py
